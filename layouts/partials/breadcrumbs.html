{{ if .Site.Params.breadcrumbs | default true }}
<nav class="breadcrumbs">
    <a href="{{ .Site.Home.RelPermalink }}">首页</a>
    {{ range .Ancestors.Reverse }}
        <span>/</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{ end }}
    <span>/</span>
    <span>{{ .Title }}</span>
</nav>
{{ end }}
